services:
  # Backend Laravel
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintech-app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fintech-network
    restart: unless-stopped

  # Banco de Dados MySQL
  mysql:
    image: mysql:8.0
    container_name: fintech-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_PORT}:3306"
    networks:
      - fintech-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Frontend Vue.js
  frontend:
    image: node:20
    container_name: fintech-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT}:5173"
    command: npm run dev
    networks:
      - fintech-network
    restart: unless-stopped

networks:
  fintech-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local