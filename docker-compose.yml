services:
  # Backend Laravel
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintech-app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-fintech_wallet}
      - DB_USERNAME=${DB_USERNAME:-fintech_user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fintech-network
    command: >
      sh -c "composer install 
      && if [ ! -f .env ]; then cp .env.example .env && php artisan key:generate; fi 
      && php artisan serve --host=0.0.0.0 --port=8000"
    restart: unless-stopped

  # Banco de Dados MySQL
  mysql:
    image: mysql:8.0
    container_name: fintech-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-fintech_wallet}
      MYSQL_USER: ${DB_USERNAME:-fintech_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - fintech-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Frontend Vue.js
  frontend:
    image: node:20
    container_name: fintech-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev"
    networks:
      - fintech-network
    restart: unless-stopped

networks:
  fintech-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local